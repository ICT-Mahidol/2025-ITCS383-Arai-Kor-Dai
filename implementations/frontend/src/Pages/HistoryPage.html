<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Office — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-light: #FF6666;
      --purple-mid: #E60012;
      --purple-dark: #8B0009;
      --bg-gradient: linear-gradient(135deg, #E60012 0%, #FFAAAA 100%);
      --card-bg: rgba(255,255,255,0.97);
      --text-dark: #1a1a2e;
      --text-muted: #6B5050;
      --accent: #E60012;
      --row-hover: #fff5f5;
      --badge-sent: #e8f5e9;
      --badge-sent-text: #2e7d32;
      --badge-received: #e3f2fd;
      --badge-received-text: #1565c0;
      --badge-pending: #fff8e1;
      --badge-pending-text: #f57f17;
      --badge-returned: #fce4ec;
      --badge-returned-text: #c62828;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.18; pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite alternate; }
    .blob-1 { width: 420px; height: 420px; background: #E60012; top: -80px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #FF9999; bottom: 40px; right: -60px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: #FF8888; top: 40%; left: 55%; animation-delay: 5s; }
    @keyframes float { from { transform: translateY(0) scale(1); } to { transform: translateY(-30px) scale(1.05); } }

    .page { position: relative; z-index: 1; width: 100%; max-width: 900px; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; animation: fadeDown 0.5s ease both; }
    .back-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.22); border: none; color: #fff; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem; font-weight: 500; padding: 8px 16px; border-radius: 50px; cursor: pointer; backdrop-filter: blur(8px); transition: background 0.2s; text-decoration: none; }
    .back-btn:hover { background: rgba(255,255,255,0.35); }
    .back-btn svg { width: 16px; height: 16px; }
    .page-title-group { text-align: center; flex: 1; }
    .page-title-group h1 { font-family: 'Barlow', sans-serif; font-size: 1.9rem; font-weight: 700; color: #fff; letter-spacing: -0.3px; text-shadow: 0 2px 12px rgba(160,20,20,0.25); }
    .page-title-group p { color: rgba(255,255,255,0.75); font-size: 0.82rem; font-weight: 300; margin-top: 2px; }
    .spacer { width: 90px; }

    .card { background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 60px rgba(140,30,30,0.18), 0 2px 8px rgba(140,30,30,0.08); overflow: hidden; animation: fadeUp 0.55s ease both 0.1s; }

    .toolbar { display: flex; align-items: center; gap: 12px; padding: 20px 24px 16px; border-bottom: 1px solid #FFE0E0; flex-wrap: wrap; }
    .search-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; background: #FFF5F5; border: 1.5px solid #ffe0e0; border-radius: 10px; padding: 9px 14px; transition: border-color 0.2s; }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap svg { color: #d48080; width: 16px; height: 16px; flex-shrink: 0; }
    .search-wrap input { border: none; background: transparent; outline: none; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem; color: var(--text-dark); width: 100%; }
    .search-wrap input::placeholder { color: #d4a0a0; }
    .filter-select { background: #FFF5F5; border: 1.5px solid #ffe0e0; border-radius: 10px; padding: 9px 14px; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem; color: var(--text-dark); outline: none; cursor: pointer; transition: border-color 0.2s; }
    .filter-select:focus { border-color: var(--accent); }
    .export-btn { display: flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .export-btn:hover { background: var(--purple-dark); transform: translateY(-1px); }
    .export-btn svg { width: 15px; height: 15px; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-bottom: 1px solid #FFE0E0; }
    .stat-item { padding: 16px 20px; text-align: center; border-right: 1px solid #FFE0E0; transition: background 0.2s; }
    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: #fff8f8; }
    .stat-num { font-family: 'Barlow', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #fff9f9; border-bottom: 2px solid #FFE0E0; }
    thead th { padding: 13px 18px; text-align: left; font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap; user-select: none; }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--accent); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 0.65rem; }

    tbody tr { border-bottom: 1px solid #fff4f4; transition: background 0.15s; animation: fadeRow 0.4s ease both; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    td { padding: 14px 18px; font-size: 0.875rem; color: var(--text-dark); vertical-align: middle; }

    .tracking-id { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; color: var(--accent); font-size: 0.82rem; letter-spacing: 0.4px; }
    .info-name { font-weight: 500; font-size: 0.875rem; }
    .info-addr { font-size: 0.75rem; color: var(--text-muted); }
    .pkg-type { display: inline-flex; align-items: center; gap: 5px; background: #FFE0E0; color: var(--purple-dark); border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; font-weight: 500; }

    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.3px; }
    .badge-sent     { background: var(--badge-sent);     color: var(--badge-sent-text); }
    .badge-received { background: var(--badge-received); color: var(--badge-received-text); }
    .badge-pending  { background: var(--badge-pending);  color: var(--badge-pending-text); }
    .badge-returned { background: var(--badge-returned); color: var(--badge-returned-text); }

    .date-cell { color: var(--text-muted); font-size: 0.82rem; white-space: nowrap; }
    .amount-cell { font-weight: 600; font-size: 0.875rem; white-space: nowrap; }

    .action-btn { background: none; border: 1.5px solid #f0bfbf; border-radius: 7px; color: var(--accent); font-size: 0.75rem; padding: 5px 11px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid #FFE0E0; flex-wrap: wrap; gap: 12px; }
    .pagination-info { font-size: 0.8rem; color: var(--text-muted); }
    .pagination-btns { display: flex; gap: 6px; }
    .pg-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1.5px solid #ffe0e0; background: #fff; color: var(--text-muted); font-size: 0.82rem; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
    .pg-btn:hover, .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(24px); }  to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeRow  { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    tbody tr:nth-child(1) { animation-delay: 0.15s; }
    tbody tr:nth-child(2) { animation-delay: 0.20s; }
    tbody tr:nth-child(3) { animation-delay: 0.25s; }
    tbody tr:nth-child(4) { animation-delay: 0.30s; }
    tbody tr:nth-child(5) { animation-delay: 0.35s; }
    tbody tr:nth-child(6) { animation-delay: 0.40s; }
    tbody tr:nth-child(7) { animation-delay: 0.45s; }
    tbody tr:nth-child(8) { animation-delay: 0.50s; }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .stat-item:nth-child(2) { border-right: none; }
      .page-title-group h1 { font-size: 1.4rem; }
      .spacer { display: none; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page">

    <div class="page-header">
      <a href="Userdashboard.html" class="back-btn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="page-title-group">
        <h1>📮 Transaction History</h1>
        <p>Post Office — All parcel &amp; mail records</p>
      </div>
      <div class="spacer"></div>
    </div>

    <div class="card">

      <div class="toolbar">
        <div class="search-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, tracking ID, city…" oninput="filterTable()" />
        </div>
        <select class="filter-select" id="statusFilter" onchange="filterTable()">
          <option value="">All Status</option>
          <option value="Sent">Sent</option>
          <option value="Received">Received</option>
          <option value="Pending">Pending</option>
          <option value="Returned">Returned</option>
        </select>
        <select class="filter-select" id="typeFilter" onchange="filterTable()">
          <option value="">All Types</option>
          <option value="Parcel">Parcel</option>
          <option value="Letter">Letter</option>
          <option value="Express">Express</option>
          <option value="Registered">Registered</option>
        </select>
        <button class="export-btn">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12v9m-4-4 4 4 4-4M12 3v9"/></svg>
          Export
        </button>
      </div>

      <div class="stats-row">
        <div class="stat-item"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Records</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#2e7d32" id="statSent">—</div><div class="stat-label">Sent</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#1565c0" id="statReceived">—</div><div class="stat-label">Received</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#f57f17" id="statPending">—</div><div class="stat-label">Pending</div></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable">Tracking ID <span class="sort-icon">↕</span></th>
              <th>Sender</th>
              <th>Receiver</th>
              <th>Type</th>
              <th class="sortable">Date <span class="sort-icon">↕</span></th>
              <th>Status</th>
              <th>Fee</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <div class="pagination-info" id="pgInfo"></div>
        <div class="pagination-btns" id="pgBtns"></div>
      </div>

    </div>
  </div>

  <script>
    // ════════════════════════════════════════
    //  FAKE DATA — 24 records
    // ════════════════════════════════════════
    const FAKE_HISTORY = [
      { id:'TH-2024-0089', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Nipa Sriwong',     rAddr:'Chiang Mai, 50000', type:'Express',    date:'12 Mar 2024', status:'Sent',     fee:'฿320' },
      { id:'TH-2024-0088', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Anan Phakdee',    rAddr:'Chiang Mai, 50200', type:'Parcel',     date:'10 Mar 2024', status:'Received', fee:'฿145' },
      { id:'TH-2024-0085', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Kanya Rungthai',  rAddr:'Phuket, 83000',     type:'Parcel',     date:'7 Mar 2024',  status:'Received', fee:'฿210' },
      { id:'TH-2024-0081', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Wanchai Boonmee', rAddr:'Khon Kaen, 40000',  type:'Parcel',     date:'3 Mar 2024',  status:'Pending',  fee:'฿145' },
      { id:'TH-2024-0077', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Somsak Kanta',    rAddr:'Hat Yai, 90110',    type:'Parcel',     date:'28 Feb 2024', status:'Pending',  fee:'฿110' },
      { id:'TH-2024-0074', sender:'Malee Wongsiri', sAddr:'Nonthaburi, 11000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Letter',     date:'25 Feb 2024', status:'Received', fee:'฿35'  },
      { id:'TH-2024-0071', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Pairot Danai',    rAddr:'Ayutthaya, 13000',  type:'Registered', date:'22 Feb 2024', status:'Sent',     fee:'฿85'  },
      { id:'TH-2024-0068', sender:'Chalerm Saeng',  sAddr:'Chonburi, 20000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110',  type:'Parcel',     date:'19 Feb 2024', status:'Received', fee:'฿190' },
      { id:'TH-2024-0065', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Sunan Klaewkla',  rAddr:'Udon Thani, 41000', type:'Express',    date:'16 Feb 2024', status:'Sent',     fee:'฿480' },
      { id:'TH-2024-0062', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Pornchai Mee',    rAddr:'Nakhon Ratchasima, 30000', type:'Parcel', date:'13 Feb 2024', status:'Returned', fee:'฿160' },
      { id:'TH-2024-0059', sender:'Natthida Ploy',  sAddr:'Samut Prakan, 10280', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Letter',   date:'10 Feb 2024', status:'Received', fee:'฿30'  },
      { id:'TH-2024-0056', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Rattana Suphan',  rAddr:'Lampang, 52000',    type:'Parcel',     date:'7 Feb 2024',  status:'Sent',     fee:'฿225' },
      { id:'TH-2024-0053', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Jirapong Chai',   rAddr:'Chiang Rai, 57000', type:'Registered', date:'4 Feb 2024',  status:'Sent',     fee:'฿95'  },
      { id:'TH-2024-0050', sender:'Kamol Thong',    sAddr:'Pathum Thani, 12000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Parcel',   date:'1 Feb 2024',  status:'Received', fee:'฿175' },
      { id:'TH-2024-0047', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Suda Prasert',    rAddr:'Nakhon Si Thammarat, 80000', type:'Parcel', date:'28 Jan 2024', status:'Sent', fee:'฿310' },
      { id:'TH-2024-0044', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Thanawat Rung',   rAddr:'Suratthani, 84000', type:'Express',    date:'25 Jan 2024', status:'Received', fee:'฿390' },
      { id:'TH-2024-0041', sender:'Orawan Suksri',  sAddr:'Nonthaburi, 11000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Letter',     date:'22 Jan 2024', status:'Received', fee:'฿25'  },
      { id:'TH-2024-0038', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Banjerd Wichai',  rAddr:'Ubon Ratchathani, 34000', type:'Parcel', date:'19 Jan 2024', status:'Returned', fee:'฿200' },
      { id:'TH-2024-0035', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Monthon Siri',    rAddr:'Khon Kaen, 40000',  type:'Parcel',     date:'16 Jan 2024', status:'Sent',     fee:'฿130' },
      { id:'TH-2024-0032', sender:'Preecha Namwong', sAddr:'Chachoengsao, 24000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Registered', date:'13 Jan 2024', status:'Received', fee:'฿70' },
      { id:'TH-2024-0029', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Jitpanu Saipin',  rAddr:'Phitsanulok, 65000', type:'Parcel',    date:'10 Jan 2024', status:'Sent',     fee:'฿165' },
      { id:'TH-2024-0026', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Kanokwan Dee',    rAddr:'Chiang Mai, 50300', type:'Express',    date:'7 Jan 2024',  status:'Received', fee:'฿420' },
      { id:'TH-2024-0023', sender:'Siriporn Lak',   sAddr:'Samut Sakhon, 74000', receiver:'Somchai Jaidee', rAddr:'Bangkok, 10110', type:'Parcel',   date:'4 Jan 2024',  status:'Received', fee:'฿140' },
      { id:'TH-2024-0020', sender:'Somchai Jaidee', sAddr:'Bangkok, 10110', receiver:'Nopporn Chai',    rAddr:'Roi Et, 45000',     type:'Letter',     date:'1 Jan 2024',  status:'Pending',  fee:'฿40'  },
    ];

    const typeIcons = { Parcel:'📦', Letter:'✉️', Express:'⚡', Registered:'📋' };

    let allData      = [...FAKE_HISTORY];
    let filteredData = [...FAKE_HISTORY];
    let currentPage  = 1;
    const ROWS_PER_PAGE = 8;

    // ════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════
    function getBadge(status) {
      const map = { Sent:'badge-sent', Received:'badge-received', Pending:'badge-pending', Returned:'badge-returned' };
      return `<span class="badge ${map[status] || 'badge-pending'}">${status}</span>`;
    }

    // ════════════════════════════════════════
    //  RENDER TABLE
    // ════════════════════════════════════════
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const pageData = filteredData.slice(start, start + ROWS_PER_PAGE);

      if (!pageData.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:36px;color:var(--text-muted);">No records found.</td></tr>`;
      } else {
        tbody.innerHTML = pageData.map(r => `
          <tr>
            <td><span class="tracking-id">${r.id}</span></td>
            <td><div><div class="info-name">${r.sender}</div><div class="info-addr">${r.sAddr}</div></div></td>
            <td><div><div class="info-name">${r.receiver}</div><div class="info-addr">${r.rAddr}</div></div></td>
            <td><span class="pkg-type">${typeIcons[r.type] || '📦'} ${r.type}</span></td>
            <td class="date-cell">${r.date}</td>
            <td>${getBadge(r.status)}</td>
            <td class="amount-cell">${r.fee}</td>
            <td><button class="action-btn" onclick="viewShipment('${r.id}')">View</button></td>
          </tr>
        `).join('');
      }

      const total = filteredData.length;
      const end   = Math.min(start + ROWS_PER_PAGE, total);
      document.getElementById('pgInfo').textContent = total
        ? `Showing ${start + 1}–${end} of ${total} records`
        : 'No records found';

      renderPagination(total);
      updateStats();
    }

    // ════════════════════════════════════════
    //  PAGINATION
    // ════════════════════════════════════════
    function renderPagination(total) {
      const totalPages = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));
      const wrap = document.getElementById('pgBtns');
      wrap.innerHTML = '';

      // Prev
      const prev = document.createElement('button');
      prev.className = 'pg-btn';
      prev.textContent = '‹';
      prev.disabled = currentPage === 1;
      prev.onclick = () => { currentPage--; renderTable(); };
      wrap.appendChild(prev);

      // Page number buttons (show up to 5 around current)
      const range = [];
      for (let i = 1; i <= totalPages; i++) range.push(i);
      const visible = range.filter(p => p === 1 || p === totalPages || Math.abs(p - currentPage) <= 1);

      let lastPg = null;
      visible.forEach(pg => {
        if (lastPg !== null && pg - lastPg > 1) {
          const dots = document.createElement('button');
          dots.className = 'pg-btn';
          dots.textContent = '…';
          dots.disabled = true;
          wrap.appendChild(dots);
        }
        const btn = document.createElement('button');
        btn.className = 'pg-btn' + (pg === currentPage ? ' active' : '');
        btn.textContent = pg;
        btn.onclick = () => { currentPage = pg; renderTable(); };
        wrap.appendChild(btn);
        lastPg = pg;
      });

      // Next
      const next = document.createElement('button');
      next.className = 'pg-btn';
      next.textContent = '›';
      next.disabled = currentPage >= totalPages;
      next.onclick = () => { currentPage++; renderTable(); };
      wrap.appendChild(next);
    }

    // ════════════════════════════════════════
    //  FILTER
    // ════════════════════════════════════════
    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const s = document.getElementById('statusFilter').value;
      const t = document.getElementById('typeFilter').value;

      filteredData = allData.filter(r =>
        (!q || [r.id, r.sender, r.receiver, r.sAddr, r.rAddr].some(v => v.toLowerCase().includes(q))) &&
        (!s || r.status === s) &&
        (!t || r.type   === t)
      );
      currentPage = 1;
      renderTable();
    }

    // ════════════════════════════════════════
    //  STATS
    // ════════════════════════════════════════
    function updateStats() {
      const d = filteredData;
      document.getElementById('statTotal').textContent    = d.length;
      document.getElementById('statSent').textContent     = d.filter(r => r.status === 'Sent').length;
      document.getElementById('statReceived').textContent = d.filter(r => r.status === 'Received').length;
      document.getElementById('statPending').textContent  = d.filter(r => r.status === 'Pending').length;
    }

    // ════════════════════════════════════════
    //  VIEW
    // ════════════════════════════════════════
    function viewShipment(trackId) {
      window.location.href = `TrackingPage.html?id=${encodeURIComponent(trackId)}`;
    }

    // ════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════
    renderTable();
  </script>
</body>
</html>
