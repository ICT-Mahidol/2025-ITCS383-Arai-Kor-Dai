<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Office — History</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-light: #FF6666;
      --purple-mid: #E60012;
      --purple-dark: #8B0009;
      --bg-gradient: linear-gradient(135deg, #E60012 0%, #FFAAAA 100%);
      --card-bg: rgba(255,255,255,0.97);
      --text-dark: #1a1a2e;
      --text-muted: #6B5050;
      --accent: #E60012;
      --row-hover: #f3f1ff;
      --badge-sent: #e8f5e9;
      --badge-sent-text: #2e7d32;
      --badge-received: #e3f2fd;
      --badge-received-text: #1565c0;
      --badge-pending: #fff8e1;
      --badge-pending-text: #f57f17;
      --badge-returned: #fce4ec;
      --badge-returned-text: #c62828;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: #E60012; top: -80px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #FF9999; bottom: 40px; right: -60px; animation-delay: 3s; }
    .blob-3 { width: 200px; height: 200px; background: #FF8888; top: 40%; left: 55%; animation-delay: 5s; }

    @keyframes float {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-30px) scale(1.05); }
    }

    /* Page wrapper */
    .page { position: relative; z-index: 1; width: 100%; max-width: 900px; }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.22);
      border: none;
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }
    .back-btn svg { width: 16px; height: 16px; }

    .page-title-group { text-align: center; flex: 1; }
    .page-title-group h1 {
      font-family: 'Barlow', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 12px rgba(160,20,20,0.25);
    }
    .page-title-group p {
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
      font-weight: 300;
      margin-top: 2px;
    }

    .spacer { width: 90px; } /* balance the back button */

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(140,30,30,0.18), 0 2px 8px rgba(140,30,30,0.08);
      overflow: hidden;
      animation: fadeUp 0.55s ease both 0.1s;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #FFE0E0;
      flex-wrap: wrap;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 200px;
      background: #FFF5F5;
      border: 1.5px solid #ebe8ff;
      border-radius: 10px;
      padding: 9px 14px;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap svg { color: #d48080; width: 16px; height: 16px; flex-shrink: 0; }
    .search-wrap input {
      border: none; background: transparent; outline: none;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 0.875rem;
      color: var(--text-dark); width: 100%;
    }
    .search-wrap input::placeholder { color: #d4a0a0; }

    .filter-select {
      background: #FFF5F5;
      border: 1.5px solid #ebe8ff;
      border-radius: 10px;
      padding: 9px 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text-dark);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--accent); }

    .export-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .export-btn:hover { background: var(--purple-dark); transform: translateY(-1px); }
    .export-btn svg { width: 15px; height: 15px; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-bottom: 1px solid #FFE0E0;
    }
    .stat-item {
      padding: 16px 20px;
      text-align: center;
      border-right: 1px solid #FFE0E0;
      position: relative;
      transition: background 0.2s;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: #fbfaff; }
    .stat-num {
      font-family: 'Barlow', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: #fff9f9;
      border-bottom: 2px solid #ebe8ff;
    }
    thead th {
      padding: 13px 18px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      white-space: nowrap;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--accent); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 0.65rem; }

    tbody tr {
      border-bottom: 1px solid #fff4f4;
      transition: background 0.15s;
      animation: fadeRow 0.4s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: 14px 18px;
      font-size: 0.875rem;
      color: var(--text-dark);
      vertical-align: middle;
    }

    .tracking-id {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.4px;
    }

    .sender-info, .receiver-info { line-height: 1.3; }
    .info-name { font-weight: 500; font-size: 0.875rem; }
    .info-addr { font-size: 0.75rem; color: var(--text-muted); }

    .pkg-type {
      display: inline-flex; align-items: center; gap: 5px;
      background: #FFE0E0; color: var(--purple-dark);
      border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 500;
    }
    .pkg-type svg { width: 12px; height: 12px; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-sent     { background: var(--badge-sent);     color: var(--badge-sent-text); }
    .badge-received { background: var(--badge-received); color: var(--badge-received-text); }
    .badge-pending  { background: var(--badge-pending);  color: var(--badge-pending-text); }
    .badge-returned { background: var(--badge-returned); color: var(--badge-returned-text); }

    .date-cell { color: var(--text-muted); font-size: 0.82rem; white-space: nowrap; }

    .amount-cell { font-weight: 600; font-size: 0.875rem; white-space: nowrap; }

    .action-btn {
      background: none;
      border: 1.5px solid #f0bfbf;
      border-radius: 7px;
      color: var(--accent);
      font-size: 0.75rem;
      padding: 5px 11px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }
    .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid #FFE0E0;
      flex-wrap: wrap;
      gap: 12px;
    }
    .pagination-info { font-size: 0.8rem; color: var(--text-muted); }
    .pagination-btns { display: flex; gap: 6px; }
    .pg-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      border: 1.5px solid #ebe8ff;
      background: #fff;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }
    .pg-btn:hover, .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeRow {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Stagger rows */
    tbody tr:nth-child(1)  { animation-delay: 0.15s; }
    tbody tr:nth-child(2)  { animation-delay: 0.20s; }
    tbody tr:nth-child(3)  { animation-delay: 0.25s; }
    tbody tr:nth-child(4)  { animation-delay: 0.30s; }
    tbody tr:nth-child(5)  { animation-delay: 0.35s; }
    tbody tr:nth-child(6)  { animation-delay: 0.40s; }
    tbody tr:nth-child(7)  { animation-delay: 0.45s; }
    tbody tr:nth-child(8)  { animation-delay: 0.50s; }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .stat-item:nth-child(2) { border-right: none; }
      .page-title-group h1 { font-size: 1.4rem; }
      .spacer { display: none; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page">

    <!-- Header -->
    <div class="page-header">
      <a href="UserDashboard.html" class="back-btn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="page-title-group">
        <h1>📮 Transaction History</h1>
        <p>Post Office — All parcel &amp; mail records</p>
      </div>
      <div class="spacer"></div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, tracking ID, city…" oninput="filterTable()" />
        </div>
        <select class="filter-select" id="statusFilter" onchange="filterTable()">
          <option value="">All Status</option>
          <option value="Sent">Sent</option>
          <option value="Received">Received</option>
          <option value="Pending">Pending</option>
          <option value="Returned">Returned</option>
        </select>
        <select class="filter-select" id="typeFilter" onchange="filterTable()">
          <option value="">All Types</option>
          <option value="Parcel">Parcel</option>
          <option value="Letter">Letter</option>
          <option value="Express">Express</option>
          <option value="Registered">Registered</option>
        </select>
        <button class="export-btn">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12v9m-4-4 4 4 4-4M12 3v9"/></svg>
          Export
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num" id="statTotal">24</div>
          <div class="stat-label">Total Records</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:#2e7d32" id="statSent">9</div>
          <div class="stat-label">Sent</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:#1565c0" id="statReceived">8</div>
          <div class="stat-label">Received</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" style="color:#f57f17" id="statPending">5</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable">Tracking ID <span class="sort-icon">↕</span></th>
              <th>Sender</th>
              <th>Receiver</th>
              <th>Type</th>
              <th class="sortable">Date <span class="sort-icon">↕</span></th>
              <th>Status</th>
              <th>Fee</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <div class="pagination-info" id="pgInfo">Showing 1–8 of 24 records</div>
        <div class="pagination-btns">
          <button class="pg-btn" id="pgPrev" onclick="changePage(-1)" disabled>‹</button>
          <button class="pg-btn active" id="pg1" onclick="goPage(1)">1</button>
          <button class="pg-btn" id="pg2" onclick="goPage(2)">2</button>
          <button class="pg-btn" id="pg3" onclick="goPage(3)">3</button>
          <button class="pg-btn" id="pgNext" onclick="changePage(1)">›</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const allData = [
      { id:'PO-20240301', sender:'Somchai Jaidee', sAddr:'123 Sukhumvit, Bangkok', receiver:'Nattapong Sriwan', rAddr:'45 Nimman, Chiang Mai', type:'Parcel', date:'01 Mar 2024', status:'Sent', fee:'฿85' },
      { id:'PO-20240302', sender:'Malee Thongchai', sAddr:'77 Ladprao, Bangkok', receiver:'Pailin Kanchana', rAddr:'12 Tha Phae, Chiang Mai', type:'Express', date:'02 Mar 2024', status:'Received', fee:'฿210' },
      { id:'PO-20240303', sender:'Prasit Wongdee', sAddr:'8 Ratchada, Bangkok', receiver:'Suda Meechai', rAddr:'90 Hat Yai, Songkhla', type:'Letter', date:'03 Mar 2024', status:'Pending', fee:'฿18' },
      { id:'PO-20240304', sender:'Wanchai Boonnak', sAddr:'5 Pinklao, Bangkok', receiver:'Kamolpan Ruangrit', rAddr:'33 Udon Thani', type:'Registered', date:'04 Mar 2024', status:'Sent', fee:'฿120' },
      { id:'PO-20240305', sender:'Duangjai Suthisak', sAddr:'99 Silom, Bangkok', receiver:'Siriporn Chaiyapoom', rAddr:'22 Korat, Nakhon', type:'Parcel', date:'05 Mar 2024', status:'Received', fee:'฿95' },
      { id:'PO-20240306', sender:'Krisada Prayoon', sAddr:'14 Victory, Bangkok', receiver:'Thitima Wongsri', rAddr:'7 Phuket Town', type:'Express', date:'06 Mar 2024', status:'Returned', fee:'฿185' },
      { id:'PO-20240307', sender:'Narong Sombat', sAddr:'58 Din Daeng, Bangkok', receiver:'Orawan Klahan', rAddr:'61 Khon Kaen', type:'Letter', date:'07 Mar 2024', status:'Pending', fee:'฿15' },
      { id:'PO-20240308', sender:'Arunee Phrommas', sAddr:'30 Bangkapi, Bangkok', receiver:'Jirapat Tangsiri', rAddr:'18 Lampang', type:'Parcel', date:'08 Mar 2024', status:'Sent', fee:'฿75' },
      { id:'PO-20240309', sender:'Thanit Rungrot', sAddr:'11 Minburi, Bangkok', receiver:'Naphat Suwanrat', rAddr:'55 Trang City', type:'Registered', date:'09 Mar 2024', status:'Received', fee:'฿110' },
      { id:'PO-20240310', sender:'Pimchanok Kaewtip', sAddr:'2 Onnut, Bangkok', receiver:'Chanwit Plaichua', rAddr:'40 Phitsanulok', type:'Express', date:'10 Mar 2024', status:'Sent', fee:'฿230' },
      { id:'PO-20240311', sender:'Sakda Jirapong', sAddr:'66 Bangna, Bangkok', receiver:'Ratana Wimolchai', rAddr:'3 Surin City', type:'Parcel', date:'11 Mar 2024', status:'Pending', fee:'฿88' },
      { id:'PO-20240312', sender:'Pensri Chalermsuk', sAddr:'19 Thonburi, Bangkok', receiver:'Arthit Phongphan', rAddr:'28 Roi Et', type:'Letter', date:'12 Mar 2024', status:'Received', fee:'฿20' },
      { id:'PO-20240313', sender:'Chaiwat Prateep', sAddr:'47 Lat Krabang, BKK', receiver:'Monthon Kaewkla', rAddr:'36 Nakhon Sawan', type:'Registered', date:'13 Mar 2024', status:'Sent', fee:'฿130' },
      { id:'PO-20240314', sender:'Itsara Boonsri', sAddr:'83 Ramkhamhaeng, BKK', receiver:'Kwanchai Srisombut', rAddr:'9 Phrae City', type:'Parcel', date:'14 Mar 2024', status:'Returned', fee:'฿92' },
      { id:'PO-20240315', sender:'Nopparat Yodbua', sAddr:'25 Chatuchak, Bangkok', receiver:'Supaporn Chomkham', rAddr:'71 Ubon Ratchathani', type:'Express', date:'15 Mar 2024', status:'Received', fee:'฿215' },
      { id:'PO-20240316', sender:'Siriwan Sukthai', sAddr:'37 Lad Phrao, Bangkok', receiver:'Theerapat Boosri', rAddr:'14 Nong Khai', type:'Letter', date:'16 Mar 2024', status:'Sent', fee:'฿17' },
      { id:'PO-20240317', sender:'Jaruwat Sriamporn', sAddr:'60 Prawet, Bangkok', receiver:'Manee Keerapat', rAddr:'52 Yala City', type:'Parcel', date:'17 Mar 2024', status:'Pending', fee:'฿80' },
      { id:'PO-20240318', sender:'Montri Chaiwong', sAddr:'4 Saphan Sung, BKK', receiver:'Sirikul Phunwiset', rAddr:'29 Satun', type:'Registered', date:'18 Mar 2024', status:'Received', fee:'฿105' },
      { id:'PO-20240319', sender:'Pornpan Saeyang', sAddr:'10 Bueng Kum, BKK', receiver:'Atchara Kaitong', rAddr:'6 Nakhon Pathom', type:'Express', date:'19 Mar 2024', status:'Sent', fee:'฿200' },
      { id:'PO-20240320', sender:'Winai Chamroon', sAddr:'72 Nong Chok, BKK', receiver:'Patcharin Duangsri', rAddr:'38 Ang Thong', type:'Parcel', date:'20 Mar 2024', status:'Pending', fee:'฿78' },
      { id:'PO-20240321', sender:'Rungnapha Srisuk', sAddr:'15 Klong Sam Wa, BKK', receiver:'Watcharaporn Sae', rAddr:'17 Samut Prakan', type:'Letter', date:'21 Mar 2024', status:'Sent', fee:'฿16' },
      { id:'PO-20240322', sender:'Apichart Namuang', sAddr:'88 Min Buri, Bangkok', receiver:'Darunee Phromkham', rAddr:'63 Samut Sakhon', type:'Registered', date:'22 Mar 2024', status:'Received', fee:'฿115' },
      { id:'PO-20240323', sender:'Suphannika Srithai', sAddr:'33 Lat Phrao, BKK', receiver:'Ekkawit Chanwit', rAddr:'41 Pathum Thani', type:'Express', date:'23 Mar 2024', status:'Returned', fee:'฿225' },
      { id:'PO-20240324', sender:'Viroj Wattanasak', sAddr:'55 Saphan Kwai, BKK', receiver:'Nanthicha Suwanno', rAddr:'24 Nonthaburi', type:'Parcel', date:'24 Mar 2024', status:'Pending', fee:'฿90' },
    ];

    const ROWS_PER_PAGE = 8;
    let currentPage = 1;
    let filteredData = [...allData];

    const typeIcons = {
      Parcel:'📦', Letter:'✉️', Express:'⚡', Registered:'📋'
    };

    function getBadge(status) {
      const map = { Sent:'badge-sent', Received:'badge-received', Pending:'badge-pending', Returned:'badge-returned' };
      return `<span class="badge ${map[status]||''}">${status}</span>`;
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const start = (currentPage - 1) * ROWS_PER_PAGE;
      const pageData = filteredData.slice(start, start + ROWS_PER_PAGE);

      tbody.innerHTML = pageData.map(r => `
        <tr>
          <td><span class="tracking-id">${r.id}</span></td>
          <td><div class="sender-info"><div class="info-name">${r.sender}</div><div class="info-addr">${r.sAddr}</div></div></td>
          <td><div class="receiver-info"><div class="info-name">${r.receiver}</div><div class="info-addr">${r.rAddr}</div></div></td>
          <td><span class="pkg-type">${typeIcons[r.type]||'📌'} ${r.type}</span></td>
          <td class="date-cell">${r.date}</td>
          <td>${getBadge(r.status)}</td>
          <td class="amount-cell">${r.fee}</td>
          <td><button class="action-btn">View</button></td>
        </tr>
      `).join('');

      const total = filteredData.length;
      const end = Math.min(start + ROWS_PER_PAGE, total);
      document.getElementById('pgInfo').textContent = total
        ? `Showing ${start+1}–${end} of ${total} records`
        : 'No records found';

      // update page buttons
      const totalPages = Math.ceil(total / ROWS_PER_PAGE);
      ['pg1','pg2','pg3'].forEach((id,i) => {
        const btn = document.getElementById(id);
        const pg = i+1;
        btn.style.display = pg <= totalPages ? '' : 'none';
        btn.classList.toggle('active', pg === currentPage);
      });
      document.getElementById('pgPrev').disabled = currentPage === 1;
      document.getElementById('pgNext').disabled = currentPage >= totalPages;
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const s = document.getElementById('statusFilter').value;
      const t = document.getElementById('typeFilter').value;
      filteredData = allData.filter(r =>
        (!q || [r.id,r.sender,r.receiver,r.sAddr,r.rAddr].some(v=>v.toLowerCase().includes(q))) &&
        (!s || r.status === s) &&
        (!t || r.type === t)
      );
      currentPage = 1;
      updateStats();
      renderTable();
    }

    function updateStats() {
      const d = filteredData;
      document.getElementById('statTotal').textContent    = d.length;
      document.getElementById('statSent').textContent     = d.filter(r=>r.status==='Sent').length;
      document.getElementById('statReceived').textContent = d.filter(r=>r.status==='Received').length;
      document.getElementById('statPending').textContent  = d.filter(r=>r.status==='Pending').length;
    }

    function changePage(dir) {
      const total = Math.ceil(filteredData.length / ROWS_PER_PAGE);
      currentPage = Math.max(1, Math.min(total, currentPage + dir));
      renderTable();
    }
    function goPage(pg) { currentPage = pg; renderTable(); }

    // Init
    updateStats();
    renderTable();
  </script>
</body>
</html>
