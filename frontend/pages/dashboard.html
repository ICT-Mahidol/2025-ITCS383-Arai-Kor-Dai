<!--
  Dashboard page for Post Office Management System
  This is a standalone page loaded into the index page container when clicking Dashboard.
-->
<div class="dashboard-page">
  <header class="dashboard-header">
    <h2>Dashboard</h2>
    <p>Quick overview of shipments, customers, and tracking activity.</p>
  </header>

  <section class="stats-grid">
    <article class="stats-card">
      <h3>Total Parcels</h3>
      <p id="stat-parcels">Loading...</p>
    </article>
    <article class="stats-card">
      <h3>Active Deliveries</h3>
      <p id="stat-active">Loading...</p>
    </article>
    <article class="stats-card">
      <h3>Pending Payments</h3>
      <p id="stat-payments">Loading...</p>
    </article>
    <article class="stats-card">
      <h3>Recent Updates</h3>
      <p id="stat-updates">Loading...</p>
    </article>
  </section>

  <section class="dashboard-actions">
    <button id="refresh-dashboard" class="btn">Refresh Data</button>
  </section>
</div>
